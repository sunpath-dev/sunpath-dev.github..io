<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="sun-glow" cx="50%" cy="40%" r="50%" fx="50%" fy="40%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#c2410c" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background with very subtle rounded square feel -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Sun rays — 8 rounded pill shapes radiating outward -->
  <g transform="translate(256,213)" fill="white" opacity="0.92" filter="url(#shadow)">
    <rect x="-11" y="-148" width="22" height="50" rx="11" transform="rotate(0)"/>
    <rect x="-11" y="-148" width="22" height="50" rx="11" transform="rotate(45)"/>
    <rect x="-11" y="-148" width="22" height="50" rx="11" transform="rotate(90)"/>
    <rect x="-11" y="-148" width="22" height="50" rx="11" transform="rotate(135)"/>
    <rect x="-11" y="-148" width="22" height="50" rx="11" transform="rotate(180)"/>
    <rect x="-11" y="-148" width="22" height="50" rx="11" transform="rotate(225)"/>
    <rect x="-11" y="-148" width="22" height="50" rx="11" transform="rotate(270)"/>
    <rect x="-11" y="-148" width="22" height="50" rx="11" transform="rotate(315)"/>
  </g>

  <!-- Sun disc -->
  <circle cx="256" cy="213" r="86" fill="white" filter="url(#shadow)"/>

  <!-- Subtle amber center of sun (warmth / depth) -->
  <circle cx="256" cy="213" r="34" fill="#fef3c7" opacity="0.6"/>

  <!-- Navigation path — curved arc of 3 dots representing the "path" the rep walks -->
  <!-- Curved connector line -->
  <path
    d="M 150 352 Q 256 412 362 352"
    stroke="white"
    stroke-width="16"
    stroke-linecap="round"
    fill="none"
    opacity="0.88"
  />

  <!-- Left dot (door already knocked) -->
  <circle cx="150" cy="352" r="23" fill="white" opacity="0.75"/>

  <!-- Middle dot (current position) — larger, brighter -->
  <circle cx="256" cy="398" r="27" fill="white"/>
  <!-- Inner amber glow = current location pin -->
  <circle cx="256" cy="398" r="12" fill="#f97316"/>

  <!-- Right dot (next target) -->
  <circle cx="362" cy="352" r="23" fill="white" opacity="0.75"/>

  <!-- Small right-pointing arrow on the rightmost dot to hint "direction" -->
  <polyline
    points="356,344 368,352 356,360"
    stroke="#f97316"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
