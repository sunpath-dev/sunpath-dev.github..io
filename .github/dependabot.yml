# Dependabot config — pre-launch hardening item from plan.md
# (Operational security: automated security patching).
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/New_York
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      types:
        patterns:
          - "@types/*"
      eslint:
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"
      vite:
        patterns:
          - "vite*"
          - "@vitejs/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-router-dom"
      supabase:
        patterns:
          - "@supabase/*"
    ignore:
      # Major version bumps are reviewed manually
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
