name: ingest-parcels

on:
  workflow_dispatch:
    inputs:
      adapter:
        description: "Adapter name (scott-va)"
        required: true
        default: scott-va
        type: choice
        options:
          - scott-va
      limit:
        description: "Max parcels to ingest (leave blank for all)"
        required: false
        default: ""
      dry_run:
        description: "Dry run — fetch + normalize but do NOT write to DB"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build parcel-adapters
        run: pnpm --filter parcel-adapters build
      - name: Run ingest
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ARGS="--adapter ${{ inputs.adapter }}"
          if [ -n "${{ inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ inputs.limit }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          pnpm exec tsx scripts/ingest-parcels.ts $ARGS
